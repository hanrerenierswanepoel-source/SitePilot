<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NorthStar Digital Survey Form</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="container">

    <h1 id="title">NorthStar Digital Survey Form</h1>

    <p id="description">
      Thank you for taking the time to help us improve our business.
    </p>

    <form id="survey-form">

      <!-- NAME -->

      <section class="form-group">
        <label for="name" id="name-label">
          Name
        </label>

        <input
          id="name"
          name="name"
          type="text"
          placeholder="Enter your name"
          required
        />
      </section>

      <!-- EMAIL -->

      <section class="form-group">
        <label for="email" id="email-label">
          Email
        </label>

        <input
          id="email"
          name="email"
          type="email"
          placeholder="Enter your email"
          required
        />
      </section>

      <!-- AGE -->

      <section class="form-group">
        <label for="number" id="number-label">
          Age (Optional)
        </label>

        <input
          id="number"
          name="age"
          type="number"
          placeholder="Age"
          min="5"
          max="100"
        />
      </section>

      <!-- ROLE -->

      <section class="form-group">

        <label for="role-dropdown">
          Which option best describes your current role?
        </label>

        <select
          id="role-dropdown"
          name="role"
        >
          <option value="">
            Select current role
          </option>

          <option value="full-time-student">
            Full-time student
          </option>

          <option value="part-time-student">
            Part-time student
          </option>

          <option value="employed-full-time">
            Employed full-time
          </option>

          <option value="employed-part-time">
            Employed part-time
          </option>

          <option value="self-employed">
            Self-employed / Business Owner
          </option>

          <option value="unemployed">
            Unemployed / Seeking work
          </option>

          <option value="not-seeking-work">
            Not currently seeking work
          </option>

          <option value="prefer-not-to-say">
            Prefer not to say
          </option>

          <option value="other">
            Other
          </option>
        </select>

      </section>

      <!-- RECOMMEND -->

      <section class="form-group">

        <p>
          Would you recommend NorthStar Digital to anyone?
        </p>

        <label class="option-label">
          <input
            type="radio"
            name="recommend"
            value="Definitely"
          />
          Definitely
        </label>

        <label class="option-label">
          <input
            type="radio"
            name="recommend"
            value="Maybe"
          />
          Maybe
        </label>

        <label class="option-label">
          <input
            type="radio"
            name="recommend"
            value="Not Sure"
          />
          Not sure
        </label>

      </section>

      <!-- FAVORITE SERVICE -->

      <section class="form-group">

        <label for="favorite-service">
          What did you enjoy most about working with us?
        </label>

        <select
          id="favorite-service"
          name="favorite-service"
        >
          <option value="">
            Select an option
          </option>

          <option>
            Website Design
          </option>

          <option>
            Website Development
          </option>

          <option>
            Branding / Logo Design
          </option>

          <option>
            Social Media Content Creation
          </option>

          <option>
            Social Media Management
          </option>

          <option>
            Advertising / Paid Ads
          </option>

          <option>
            SEO (Google Ranking Improvement)
          </option>

          <option>
            Strategy Advice
          </option>

          <option>
            Fast Communication / Support
          </option>

          <option>
            Professional Quality of Work
          </option>

          <option>
            Overall Experience / Everything
          </option>

        </select>

      </section>

      <!-- IMPROVEMENTS -->

      <section class="form-group">

        <p>
          What would you like to see improved?
          (Check all that apply)
        </p>

        <label class="option-label">
          <input type="checkbox" name="improvements" value="website-design" />
          Website Design
        </label>

        <label class="option-label">
          <input type="checkbox" name="improvements" value="website-development" />
          Website Development
        </label>

        <label class="option-label">
          <input type="checkbox" name="improvements" value="branding" />
          Branding / Logo Design
        </label>

        <label class="option-label">
          <input type="checkbox" name="improvements" value="social-media-creation" />
          Social Media Content Creation
        </label>

        <label class="option-label">
          <input type="checkbox" name="improvements" value="social-media-management" />
          Social Media Management
        </label>

        <label class="option-label">
          <input type="checkbox" name="improvements" value="advertising" />
          Advertising / Paid Ads
        </label>

        <label class="option-label">
          <input type="checkbox" name="improvements" value="seo" />
          SEO (Google Ranking Improvement)
        </label>

        <label class="option-label">
          <input type="checkbox" name="improvements" value="strategy" />
          Strategy Advice
        </label>

        <label class="option-label">
          <input type="checkbox" name="improvements" value="content-writing" />
          Content Writing
        </label>

        <label class="option-label">
          <input type="checkbox" name="improvements" value="communication" />
          Fast Communication / Support
        </label>

        <label class="option-label">
          <input type="checkbox" name="improvements" value="quality" />
          Professional Quality of Work
        </label>

        <label class="option-label">
          <input type="checkbox" name="improvements" value="overall" />
          Overall Experience / Everything
        </label>

      </section>

      <!-- COMMENTS -->

      <section class="form-group">

        <label for="comments">
          Any comments or suggestions?
        </label>
        <section>
        <textarea
          id="comments"
          name="comments"
          placeholder="Enter your comments here..."
        ></textarea>
        </section>

      </section>

      <!-- BUTTON -->

      <section class="form-group">

        <button
          id="submit"
          type="submit"
        >
          Submit Feedback
        </button>

      </section>

    </form>

  </div>

</body>
</html>
